<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mi Flota — Checklist Vaquero</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚛</text></svg>">

<!-- React -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- Babel for in-browser JSX transform -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Firebase (modular SDK via CDN, exposed as window globals) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  window.firebaseApp = { initializeApp };
  window.firebaseFirestore = { getFirestore, doc, setDoc, onSnapshot };
  window.dispatchEvent(new Event("firebase-ready"));
</script>

<style>
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  body { margin: 0; background: #0f1623; overscroll-behavior-y: none; }
  input, textarea, button { font-family: inherit; }
  input:focus, textarea:focus { outline: none; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #2a3a56; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;
const { initializeApp } = window.firebaseApp;
const { getFirestore, doc, setDoc, onSnapshot } = window.firebaseFirestore;

// ── FIREBASE CONFIG ───────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyDkxuV5LVJIKeWA1KTAX7uNQmLHPM_t-Jc",
  authDomain: "checklist-vaquero.firebaseapp.com",
  projectId: "checklist-vaquero",
  storageBucket: "checklist-vaquero.firebasestorage.app",
  messagingSenderId: "483398698671",
  appId: "1:483398698671:web:e62b956ae04b215872765a",
};
const fbApp = initializeApp(firebaseConfig);
const fbDb  = getFirestore(fbApp);
const FLEET_DOC = doc(fbDb, "fleet", "main");

// ── CHECKLIST ITEMS ──────────────────────────────────────────────────────────
const CHECKLIST_ITEMS = [
  { id:"aceite",           categoria:"Motor",       icon:"🛢️", label:"Nivel de aceite",
    desc:"Revisar varilla o visor",
    opciones:[{v:"bajo",label:"Bajo 🔴",ok:false},{v:"medio",label:"Medio 🟡",ok:false,warn:true},{v:"normal",label:"Normal ✅",ok:true},{v:"alto",label:"Alto 🟡",ok:false,warn:true}] },
  { id:"agua",             categoria:"Motor",       icon:"💧", label:"Agua del radiador",
    desc:"Depósito de refrigerante",
    opciones:[{v:"bajo",label:"Bajo 🔴",ok:false},{v:"medio",label:"Medio 🟡",ok:false,warn:true},{v:"normal",label:"Normal ✅",ok:true}] },
  { id:"bateria",          categoria:"Motor",       icon:"🔋", label:"Batería",
    desc:"Terminales y carga",
    opciones:[{v:"corrosion",label:"Corrosión 🔴",ok:false},{v:"baja",label:"Carga baja 🟡",ok:false,warn:true},{v:"ok",label:"OK ✅",ok:true}] },
  { id:"frenos",           categoria:"Seguridad",   icon:"🛑", label:"Frenos",
    desc:"Pedal y ruido al frenar",
    opciones:[{v:"falla",label:"Falla 🔴",ok:false},{v:"ruido",label:"Ruido 🟡",ok:false,warn:true},{v:"ok",label:"OK ✅",ok:true}] },
  { id:"llantas",          categoria:"Seguridad",   icon:"⭕", label:"Llantas",
    desc:"Presión en PSI",
    opciones:[{v:"bajo20",label:"<20 psi 🔴",ok:false},{v:"20_25",label:"20–25 🟡",ok:false,warn:true},{v:"25_32",label:"25–32 ✅",ok:true},{v:"mas32",label:">32 🟡",ok:false,warn:true}] },
  { id:"luces_del",        categoria:"Luces",       icon:"💡", label:"Luces delanteras",
    desc:"Cortas, largas y niebla",
    opciones:[{v:"falla",label:"Falla 🔴",ok:false},{v:"tenue",label:"Tenue 🟡",ok:false,warn:true},{v:"ok",label:"OK ✅",ok:true}] },
  { id:"luces_tra",        categoria:"Luces",       icon:"🔴", label:"Luces traseras",
    desc:"Stop y reversa",
    opciones:[{v:"falla",label:"Falla 🔴",ok:false},{v:"ok",label:"OK ✅",ok:true}] },
  { id:"direccionales",    categoria:"Luces",       icon:"↗️", label:"Direccionales",
    desc:"Las 4 + intermitentes",
    opciones:[{v:"falla",label:"Falla 🔴",ok:false},{v:"parcial",label:"Parcial 🟡",ok:false,warn:true},{v:"ok",label:"OK ✅",ok:true}] },
  { id:"limpiaparabrisas", categoria:"Visibilidad", icon:"🌧️", label:"Limpiaparabrisas",
    desc:"Plumas y nivel de agua",
    opciones:[{v:"dano",label:"Dañado 🔴",ok:false},{v:"regular",label:"Regular 🟡",ok:false,warn:true},{v:"ok",label:"OK ✅",ok:true}] },
  { id:"espejos",          categoria:"Visibilidad", icon:"🪞", label:"Espejos",
    desc:"Ajuste y limpieza",
    opciones:[{v:"roto",label:"Roto/Suelto 🔴",ok:false},{v:"sucio",label:"Sucio 🟡",ok:false,warn:true},{v:"ok",label:"OK ✅",ok:true}] },
  { id:"cinturon",         categoria:"Interior",    icon:"🔒", label:"Cinturón de seguridad",
    desc:"Enganche y retractor",
    opciones:[{v:"falla",label:"Falla 🔴",ok:false},{v:"ok",label:"OK ✅",ok:true}] },
  { id:"combustible",      categoria:"Interior",    icon:"⛽", label:"Combustible",
    desc:"Nivel en tanque",
    opciones:[{v:"reserva",label:"Reserva 🔴",ok:false},{v:"cuarto",label:"1/4 🟡",ok:false,warn:true},{v:"medio",label:"1/2 🟡",ok:false,warn:true},{v:"lleno",label:"3/4–Lleno ✅",ok:true}] },
  { id:"carroceria_frente",  categoria:"Carrocería",  icon:"🚛", label:"Frente / Defensa",
    desc:"Golpes, rayones o daños visibles",
    opciones:[{v:"dano_grave",label:"Daño grave 🔴",ok:false},{v:"rayón",label:"Rayón/Golpe leve 🟡",ok:false,warn:true},{v:"ok",label:"Sin daños ✅",ok:true}] },
  { id:"carroceria_lateral",  categoria:"Carrocería",  icon:"🚗", label:"Laterales",
    desc:"Ambos lados de la unidad",
    opciones:[{v:"dano_grave",label:"Daño grave 🔴",ok:false},{v:"rayón",label:"Rayón/Golpe leve 🟡",ok:false,warn:true},{v:"ok",label:"Sin daños ✅",ok:true}] },
  { id:"carroceria_trasera",  categoria:"Carrocería",  icon:"🔙", label:"Parte trasera",
    desc:"Defensa, cajón o redilas",
    opciones:[{v:"dano_grave",label:"Daño grave 🔴",ok:false},{v:"rayón",label:"Rayón/Golpe leve 🟡",ok:false,warn:true},{v:"ok",label:"Sin daños ✅",ok:true}] },
  { id:"carroceria_techo",    categoria:"Carrocería",  icon:"🏠", label:"Techo / Cajón superior",
    desc:"Abolladuras o daños en la parte alta",
    opciones:[{v:"dano_grave",label:"Daño grave 🔴",ok:false},{v:"rayón",label:"Daño/Abolladura 🟡",ok:false,warn:true},{v:"ok",label:"Sin daños ✅",ok:true}] },
  { id:"carroceria_vidrios",  categoria:"Carrocería",  icon:"🪟", label:"Vidrios y parabrisas",
    desc:"Grietas, quebraduras o astillas",
    opciones:[{v:"quebrado",label:"Quebrado 🔴",ok:false},{v:"astilla",label:"Astillado 🟡",ok:false,warn:true},{v:"ok",label:"OK ✅",ok:true}] },
];
const CATEGORIAS = [...new Set(CHECKLIST_ITEMS.map(i => i.categoria))];

// ── CONSTANTS ────────────────────────────────────────────────────────────────
const STORAGE_KEY = "fleet-v4";
const V_COLORS    = ["#4fc3f7","#81c784","#ffb74d","#f48fb1","#ce93d8","#80cbc4"];
const V_EMOJIS    = ["🚛","🚚","🚗","🚙","🚐","🏎️"];
const DEFAULT_VEHICLES = [
  { id:"camion1", nombre:"Camión 1", emoji:"🚛", color:"#4fc3f7", marca:"", noEco:"" },
  { id:"camion2", nombre:"Camión 2", emoji:"🚚", color:"#81c784", marca:"", noEco:"" },
];

function todayStr() { return new Date().toISOString().split("T")[0]; }
function daysUntil(d) {
  if (!d) return null;
  return Math.ceil((new Date(d+"T12:00:00") - new Date()) / 86400000);
}
function urgencyColor(d) {
  if (d===null) return "#444";
  if (d<0||d<=15) return "#ff5252";
  if (d<=30) return "#ffb74d";
  return "#81c784";
}
function fmtDate(s) {
  if (!s) return "—";
  return new Date(s+"T12:00:00").toLocaleDateString("es-MX",{day:"numeric",month:"short",year:"numeric"});
}
function parseArchKey(key) {
  const isArch = key.includes("_");
  const dp = key.split("_")[0];
  const raw = isArch ? key.split("_")[1] : null;
  const tp = raw ? raw.slice(0,2)+":"+raw.slice(2,4) : null;
  const fecha = new Date(dp+"T12:00:00").toLocaleDateString("es-MX",{weekday:"short",day:"numeric",month:"short"});
  return { isArch, dp, tp, label: tp ? `${fecha} · ${tp}` : fecha };
}

const INPUT = (p) => <input {...p} style={{ width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid #2a3a56",background:"#172035",color:"#f0f6ff",fontFamily:"inherit",fontSize:13,boxSizing:"border-box",marginBottom:10,outline:"none",...p.style }} />;
const LABEL = ({children}) => <div style={{fontSize:10,letterSpacing:2,color:"#7a96c0",textTransform:"uppercase",marginBottom:6}}>{children}</div>;

// ════════════════════════════════════════════════════════════════════════════
function App() {
  const [vehicles,    setVehicles]    = useState(DEFAULT_VEHICLES);
  const [data,        setData]        = useState({});
  const [docs,        setDocs]        = useState({});
  // operadores[vid] = [string]
  const [operadores,  setOperadores]  = useState({});
  const [activeVid,   setActiveVid]   = useState("camion1");
  const [vista,       setVista]       = useState("hoy");
  const [subVista,    setSubVista]    = useState(null);
  const [animating,   setAnimating]   = useState(null);
  const [showAdd,     setShowAdd]     = useState(false);
  const [editVehicle, setEditVehicle] = useState(null);
  const [newNombre,   setNewNombre]   = useState("");
  const [newEmoji,    setNewEmoji]    = useState("🚗");
  const [newColor,    setNewColor]    = useState("#4fc3f7");
  const [newMarca,    setNewMarca]    = useState("");
  const [newNoEco,    setNewNoEco]    = useState("");
  // save modal
  const [showSave,    setShowSave]    = useState(false);
  const [saveChecó,   setSaveChecó]   = useState("");
  const [saveManeja,  setSaveManeja]  = useState("");
  const [saveOtroC,   setSaveOtroC]   = useState("");
  const [saveOtroM,   setSaveOtroM]   = useState("");
  const [nuevoOp,     setNuevoOp]     = useState("");
  const [selectedHistKey, setSelectedHistKey] = useState(null);
  const [svcSubVista, setSvcSubVista] = useState("pendientes"); // "pendientes" | "historial"
  // service form
  const [showSvcForm, setShowSvcForm] = useState(false);
  const [svcForm,     setSvcForm]     = useState({fecha:"",tipo:"",km:"",mecanico:"",costo:"",notas:""});
  // photo viewer
  const [viewPhoto,   setViewPhoto]   = useState(null);

  // ── LOAD + REALTIME SYNC (Firestore) ────────────────────────────────────
  const [loading,  setLoading]  = useState(true);
  const [syncing,  setSyncing]  = useState(false);
  const skipNextSnapshot = useRef(false);

  useEffect(() => {
    const unsub = onSnapshot(FLEET_DOC, (snap) => {
      if (skipNextSnapshot.current) { skipNextSnapshot.current = false; setLoading(false); return; }
      if (snap.exists()) {
        const s = snap.data();
        if (s.vehicles && s.vehicles.length) { setVehicles(s.vehicles); setActiveVid(prev => s.vehicles.find(v=>v.id===prev) ? prev : s.vehicles[0].id); }
        if (s.data)       setData(s.data);
        if (s.docs)       setDocs(s.docs);
        if (s.operadores) setOperadores(s.operadores);
      }
      setLoading(false);
    }, (err) => { console.error(err); setLoading(false); });
    return () => unsub();
  }, []);

  const persist = (v,d,dc,op) => {
    setSyncing(true);
    skipNextSnapshot.current = true;
    setDoc(FLEET_DOC, { vehicles:v, data:d, docs:dc, operadores:op })
      .catch(err=>console.error("Error guardando:",err))
      .finally(()=>setSyncing(false));
  };

  // ── VEHICLE CRUD ─────────────────────────────────────────────────────────
  const addVehicle = () => {
    if (!newNombre.trim()) return;
    const nv = {id:"v_"+Date.now(),nombre:newNombre.trim(),emoji:newEmoji,color:newColor,marca:newMarca.trim(),noEco:newNoEco.trim()};
    const nv2 = [...vehicles,nv];
    setVehicles(nv2); persist(nv2,data,docs,operadores);
    setActiveVid(nv.id); resetForm(); setShowAdd(false);
  };
  const saveEdit = () => {
    if (!newNombre.trim()) return;
    const nv = vehicles.map(v => v.id===editVehicle.id ? {...v,nombre:newNombre.trim(),emoji:newEmoji,color:newColor,marca:newMarca.trim(),noEco:newNoEco.trim()} : v);
    setVehicles(nv); persist(nv,data,docs,operadores); setEditVehicle(null);
  };
  const deleteVehicle = (vid) => {
    if (vehicles.length<=1) return;
    const nv=vehicles.filter(v=>v.id!==vid), nd={...data}, ndc={...docs}, nop={...operadores};
    delete nd[vid]; delete ndc[vid]; delete nop[vid];
    setVehicles(nv); setData(nd); setDocs(ndc); setOperadores(nop); persist(nv,nd,ndc,nop);
    if (activeVid===vid) setActiveVid(nv[0].id);
  };
  const openEdit = (v) => { setEditVehicle(v); setNewNombre(v.nombre); setNewEmoji(v.emoji); setNewColor(v.color); setNewMarca(v.marca||""); setNewNoEco(v.noEco||""); };
  const resetForm = () => { setNewNombre(""); setNewEmoji("🚗"); setNewColor("#4fc3f7"); setNewMarca(""); setNewNoEco(""); };

  // ── OPERADORES ────────────────────────────────────────────────────────────
  const opList = operadores[activeVid] || [];
  const addOperador = (nombre) => {
    const n = nombre.trim();
    if (!n || opList.includes(n)) return;
    const nop = {...operadores, [activeVid]: [...opList, n]};
    setOperadores(nop); persist(vehicles,data,docs,nop);
  };
  const removeOperador = (nombre) => {
    const nop = {...operadores, [activeVid]: opList.filter(o=>o!==nombre)};
    setOperadores(nop); persist(vehicles,data,docs,nop);
  };

  // ── CHECKLIST ─────────────────────────────────────────────────────────────
  const today      = todayStr();
  const vData      = data[activeVid] || {};
  const todayEntry = vData[today] || {};

  const setItemVal = (id, val, isOk, isWarn) => {
    setAnimating(id);
    setTimeout(()=>setAnimating(null),350);
    const cur = todayEntry[id]||{val:null,ok:false,warn:false,obs:"",foto:null};
    const nd = {...data,[activeVid]:{...vData,[today]:{...todayEntry,[id]:{...cur,val,ok:isOk,warn:!!isWarn}}}};
    setData(nd); persist(vehicles,nd,docs,operadores);
  };
  const setObs = (id, obs) => {
    const cur = todayEntry[id]||{val:null,ok:false,obs:"",foto:null};
    const nd = {...data,[activeVid]:{...vData,[today]:{...todayEntry,[id]:{...cur,obs}}}};
    setData(nd); persist(vehicles,nd,docs,operadores);
  };
  const setFoto = (id, foto) => {
    const cur = todayEntry[id]||{val:null,ok:false,obs:"",foto:null};
    const nd = {...data,[activeVid]:{...vData,[today]:{...todayEntry,[id]:{...cur,foto}}}};
    setData(nd); persist(vehicles,nd,docs,operadores);
  };

  const openSaveModal = () => {
    setSaveChecó(""); setSaveManeja(""); setSaveOtroC(""); setSaveOtroM("");
    setShowSave(true);
  };
  const confirmarGuardar = () => {
    const checó  = saveChecó==="otro" ? saveOtroC.trim() : saveChecó;
    const maneja = saveManeja==="otro" ? saveOtroM.trim() : saveManeja;
    const ts = new Date().toISOString();
    const archKey = today+"_"+ts.slice(11,19).replace(/:/g,"");
    const nd = {...data,[activeVid]:{...vData,[archKey]:{...todayEntry,_savedAt:ts,_checó:checó,_maneja:maneja},[today]:{}}};
    setData(nd); persist(vehicles,nd,docs,operadores); setShowSave(false);
  };

  const checkedCount = CHECKLIST_ITEMS.filter(i=>(todayEntry[i.id]||{}).val!=null).length;
  const okCount      = CHECKLIST_ITEMS.filter(i=>(todayEntry[i.id]||{}).ok).length;
  const total        = CHECKLIST_ITEMS.length;
  const pct          = Math.round(checkedCount/total*100);
  const av           = vehicles.find(v=>v.id===activeVid)||vehicles[0];
  const accent       = av?.color||"#4fc3f7";

  // ── DOCS ──────────────────────────────────────────────────────────────────
  const vDocs  = docs[activeVid]||{};
  const setVDocs = (partial) => {
    const nd = {...docs,[activeVid]:{...vDocs,...partial}};
    setDocs(nd); persist(vehicles,data,nd,operadores);
  };
  const servicios = vDocs.servicios||[];
  const addServicio = () => {
    if (!svcForm.fecha&&!svcForm.tipo) return;
    setVDocs({servicios:[...servicios,{...svcForm,id:Date.now()}]});
    setSvcForm({fecha:"",tipo:"",km:"",mecanico:"",costo:"",notas:""}); setShowSvcForm(false);
  };

  // historial
  const histKeys = Object.keys(vData).filter(k=>k!==today).sort((a,b)=>b.localeCompare(a)).slice(0,20);

  // fleet
  const fleetOverview = vehicles.map(v => {
    const vd=data[v.id]||{}, keys=Object.keys(vd).sort((a,b)=>b.localeCompare(a));
    const lk=keys[0]||today, vc=vd[lk]||{};
    const cnt  = CHECKLIST_ITEMS.filter(i=>(vc[i.id]||{}).val!=null).length;
    const okC  = CHECKLIST_ITEMS.filter(i=>(vc[i.id]||{}).ok).length;
    const {label:wl} = parseArchKey(lk);
    const vdc=docs[v.id]||{};
    const pD=daysUntil(vdc.placas?.vence), sD=daysUntil(vdc.seguro?.vence);
    return {...v,cnt,okC,pct:Math.round(cnt/total*100),wl,hasData:keys.length>0,pD,sD};
  });

  // ── SHARED STYLES ─────────────────────────────────────────────────────────
  const card = {background:"#172035",border:"1px solid #2a3a56",borderRadius:10,padding:"14px 16px",marginBottom:8};
  const overlay = {position:"fixed",inset:0,background:"#060e1ecc",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:16};
  const modalBox = {background:"#172035",border:"1px solid #3a4f72",borderRadius:12,padding:24,width:"100%",maxWidth:360,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 24px 48px #060e1e99"};

  // ── VEHICLE FORM ──────────────────────────────────────────────────────────
  const VehicleForm = ({title,onSave,onCancel}) => (
    <div style={overlay}>
      <div style={modalBox}>
        <div style={{fontSize:14,fontWeight:700,color:"#f0f6ff",marginBottom:16}}>{title}</div>
        <LABEL>Nombre</LABEL><INPUT value={newNombre} onChange={e=>setNewNombre(e.target.value)} placeholder="Ej. Camión 3" />
        <LABEL>Marca</LABEL><INPUT value={newMarca} onChange={e=>setNewMarca(e.target.value)} placeholder="Ej. Kenworth, Freightliner..." />
        <LABEL>Número económico</LABEL><INPUT value={newNoEco} onChange={e=>setNewNoEco(e.target.value)} placeholder="Ej. 047" />
        <LABEL>Ícono</LABEL>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
          {V_EMOJIS.map(e=><button key={e} onClick={()=>setNewEmoji(e)} style={{fontSize:22,padding:"6px 10px",borderRadius:8,border:`1.5px solid ${newEmoji===e?"#fff":"#333"}`,background:newEmoji===e?"#fff1":"transparent",cursor:"pointer"}}>{e}</button>)}
        </div>
        <LABEL>Color</LABEL>
        <div style={{display:"flex",gap:8,marginBottom:20}}>
          {V_COLORS.map(c=><div key={c} onClick={()=>setNewColor(c)} style={{width:28,height:28,borderRadius:"50%",background:c,cursor:"pointer",border:`2px solid ${newColor===c?"#fff":"transparent"}`,boxShadow:newColor===c?`0 0 8px ${c}`:"none"}} />)}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onCancel} style={{flex:1,padding:11,borderRadius:8,border:"1px solid #2a3a56",background:"transparent",color:"#b8cce8",fontFamily:"inherit",fontSize:12,cursor:"pointer"}}>Cancelar</button>
          <button onClick={onSave}   style={{flex:1,padding:11,borderRadius:8,border:"none",background:newColor,color:"#000",fontFamily:"inherit",fontSize:12,fontWeight:700,cursor:"pointer"}}>Guardar</button>
        </div>
      </div>
    </div>
  );

  // ── SAVE MODAL ────────────────────────────────────────────────────────────
  const SaveModal = () => {
    return (
      <div style={overlay}>
        <div style={modalBox}>
          <div style={{fontSize:14,fontWeight:700,color:"#f0f6ff",marginBottom:4}}>💾 Guardar revisión</div>
          <div style={{fontSize:11,color:"#7a96c0",marginBottom:16}}>{av?.emoji} {av?.nombre} · {today}</div>

          <LABEL>¿Quién checó?</LABEL>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
            {opList.map(op=>(
              <button key={op} onClick={()=>setSaveChecó(op)} style={{padding:"5px 11px",borderRadius:20,border:`1px solid ${saveChecó===op?accent:"#2a2a2a"}`,background:saveChecó===op?accent+"22":"#111",color:saveChecó===op?accent:"#666",fontFamily:"inherit",fontSize:12,cursor:"pointer"}}>
                {op}
              </button>
            ))}

  // ── PHOTO COMPONENT ───────────────────────────────────────────────────────
  const PhotoBtn = ({itemId, entry}) => {

    return (

          ))}
        </div>

        {/* ══ HOY ══════════════════════════════════════════════════════════ */}
        {vista==="hoy" && (
          <>
            {CATEGORIAS.map(cat=>(
              <div key={cat} style={{marginBottom:20}}>
                <div style={{fontSize:9,letterSpacing:3,color:"#b8cce8",textTransform:"uppercase",marginBottom:7,paddingLeft:2}}>— {cat}</div>
                {CHECKLIST_ITEMS.filter(i=>i.categoria===cat).map(item=>{
                  const entry   = todayEntry[item.id]||{val:null,ok:false,warn:false,obs:"",foto:null};
                  const selVal  = entry.val;
                  const hasVal  = selVal!=null;
                  const sc      = !hasVal?null:entry.ok?"#81c784":entry.warn?"#ffb74d":"#ff5252";

                  return (
                    <div key={item.id} style={{marginBottom:6}}>
                      {/* Header */}
                      <div style={{display:"flex",alignItems:"center",gap:11,padding:"11px 13px 8px",borderRadius:"10px 10px 0 0",background:sc?sc+"11":"#131313",border:`1px solid ${sc?sc+"aa":"#1e1e1e"}`,borderBottom:"none"}}>
                        <div style={{width:10,height:10,borderRadius:"50%",flexShrink:0,background:sc||"#2a2a2a",boxShadow:sc?`0 0 5px ${sc}`:"none",transition:"all 0.2s"}}/>
                        <span style={{fontSize:17,flexShrink:0}}>{item.icon}</span>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:600,color:sc||"#ddd"}}>{item.label}</div>
                          <div style={{fontSize:10,color:"#4a6898",marginTop:1}}>{item.desc}</div>
                        </div>
                        {hasVal&&<span style={{fontSize:10,color:sc,fontWeight:700}}>{item.opciones.find(o=>o.v===selVal)?.label}</span>}
                      </div>
                      {/* Options + obs + foto */}
                      <div style={{background:"#0f1623",border:`1px solid ${sc?sc+"aa":"#1e1e1e"}`,borderTop:"none",borderRadius:"0 0 10px 10px",padding:"8px 10px"}}>
                        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:6}}>
                          {item.opciones.map(op=>{
                            const isSel=selVal===op.v;
                            const oc=op.ok?"#81c784":op.warn?"#ffb74d":"#ff5252";
                            return (
                              <button key={op.v} onClick={()=>setItemVal(item.id,op.v,op.ok,op.warn)} style={{padding:"4px 10px",borderRadius:20,border:`1px solid ${isSel?oc:"#2a2a2a"}`,background:isSel?oc+"33":"#ede0cf",color:isSel?oc:"#555",fontFamily:"inherit",fontSize:11,cursor:"pointer",fontWeight:isSel?700:500,transition:"all 0.12s",letterSpacing:"0.01em"}}>{op.label}</button>
                            );
                          })}
                        </div>
                        <input value={entry.obs||""} onChange={e=>setObs(item.id,e.target.value)} placeholder="Nota (opcional)..." style={{width:"100%",background:"transparent",border:"none",borderBottom:"1px solid #2a3a56",color:"#b8cce8",fontFamily:"inherit",fontSize:11,outline:"none",boxSizing:"border-box",paddingBottom:5,marginBottom:hasVal&&!entry.ok?6:0}} />
                        {(hasVal && !entry.ok) || item.categoria==="Carrocería" ? <PhotoBtn itemId={item.id} entry={entry} /> : null}
                      </div>
                    </div>
                  );
                })}
              </div>
            ))}
            {checkedCount>0&&(
              <button onClick={openSaveModal} style={{width:"100%",padding:13,marginTop:8,background:accent,border:"none",borderRadius:9,color:"#0f1623",fontFamily:"inherit",fontSize:11,letterSpacing:"0.08em",textTransform:"uppercase",cursor:"pointer",fontWeight:800}}>
                💾 Guardar revisión
              </button>
            )}
          </>
        )}

        {/* ══ HISTORIAL ════════════════════════════════════════════════════ */}
        {vista==="historial" && (
          <div>
            <div style={{fontSize:11,color:"#7a96c0",marginBottom:12}}>Revisiones guardadas · {av?.emoji} {av?.nombre}</div>
            {histKeys.length===0?(
              <div style={{textAlign:"center",color:"#b8cce8",marginTop:50,fontSize:13}}><div style={{fontSize:34,marginBottom:10}}>📋</div>Sin revisiones aún.</div>
            ):selectedHistKey ? (()=>{
              // ── DETAIL VIEW ──────────────────────────────────────────────
              const entry   = vData[selectedHistKey]||{};
              const cnt     = CHECKLIST_ITEMS.filter(i=>(entry[i.id]||{}).val!=null).length;
              const okCnt   = CHECKLIST_ITEMS.filter(i=>(entry[i.id]||{}).ok).length;
              const warnCnt = CHECKLIST_ITEMS.filter(i=>(entry[i.id]||{}).warn&&!(entry[i.id]||{}).ok).length;
              const failCnt = cnt-okCnt-warnCnt;
              const p       = Math.round(cnt/total*100);
              const col     = p===100?"#34d399":p>=70?"#fbbf24":"#f87171";
              const {label} = parseArchKey(selectedHistKey);
              const checó   = entry._checó;

              return (
                <div>
                  {/* Back button */}

                  </button>
                  {/* Header card */}
                  <div style={{...card,borderColor:col+"55",marginBottom:14}}>
                    <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:10}}>
                      <div style={{width:52,height:52,borderRadius:10,background:col+"22",border:`1px solid ${col}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:800,color:col,flexShrink:0}}>{p}%</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:14,fontWeight:700,color:"#f0f6ff",textTransform:"capitalize",marginBottom:3}}>{label}</div>
                        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                          <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:"#34d39922",color:"#34d399"}}>{okCnt} OK</span>
                          {warnCnt>0&&<span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:"#fbbf2422",color:"#fbbf24"}}>{warnCnt} advertencia{warnCnt>1?"s":""}</span>}
                          {failCnt>0&&<span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:"#f8717122",color:"#f87171"}}>{failCnt} falla{failCnt>1?"s":""}</span>}

                    {(checó||maneja)&&(

                      </div>

                  {CATEGORIAS.map(cat=>(
                    <div key={cat} style={{marginBottom:16}}>
                      <div style={{fontSize:9,letterSpacing:"0.2em",color:"#f5a623",textTransform:"uppercase",marginBottom:7,paddingLeft:2,fontWeight:700}}>{cat}</div>
                      {CHECKLIST_ITEMS.filter(i=>i.categoria===cat).map(item=>{
                        const e   = entry[item.id]||{};
                        const sc  = !e.val?null:e.ok?"#34d399":e.warn?"#fbbf24":"#f87171";
                        const opL = item.opciones.find(o=>o.v===e.val)?.label||"Sin revisar";
                        return (
                          <div key={item.id} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",borderRadius:9,background:"#172035",border:`1px solid ${sc?sc+"44":"#2a3a56"}`,marginBottom:5}}>
                            <div style={{width:8,height:8,borderRadius:"50%",background:sc||"#2a3a56",flexShrink:0,boxShadow:sc?`0 0 5px ${sc}88`:"none"}}/>
                            <span style={{fontSize:16,flexShrink:0}}>{item.icon}</span>
                            <div style={{flex:1}}>
                              <div style={{fontSize:12,fontWeight:600,color:"#d0e0f8"}}>{item.label}</div>
                              {e.obs&&<div style={{fontSize:10,color:"#7a96c0",marginTop:1}}>{e.obs}</div>}
                            </div>
                            <div style={{textAlign:"right",flexShrink:0}}>
                              <div style={{fontSize:11,color:sc||"#4a6898",fontWeight:sc?700:400}}>{opL}</div>

                            </div>
                          </div>
                        );
                      })}
                    </div>
                  ))}
                </div>
              );
            })() : histKeys.map(key=>{
              const entry=vData[key]||{};
              const cnt   = CHECKLIST_ITEMS.filter(i=>(entry[i.id]||{}).val!=null).length;
              const okCnt = CHECKLIST_ITEMS.filter(i=>(entry[i.id]||{}).ok).length;
              const warnCnt = CHECKLIST_ITEMS.filter(i=>(entry[i.id]||{}).warn&&!(entry[i.id]||{}).ok).length;
              const p   = Math.round(cnt/total*100);
              const col = p===100?"#34d399":p>=70?"#fbbf24":"#f87171";
              const {isArch,label} = parseArchKey(key);
              const checó  = entry._checó;
              const maneja = entry._maneja;
              const issueItems = CHECKLIST_ITEMS.filter(i=>(entry[i.id]||{}).val&&!(entry[i.id]||{}).ok);
              return (
                <div key={key} onClick={()=>setSelectedHistKey(key)} style={{...card,marginBottom:8,cursor:"pointer",transition:"all 0.15s"}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:42,height:42,borderRadius:8,background:col+"22",border:`1px solid ${col}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:col,flexShrink:0}}>{p}%</div>

                      <div style={{fontSize:12,fontWeight:600,color:"#d0e0f8",textTransform:"capitalize"}}>
                        {isArch&&<span style={{fontSize:9,color:"#7a96c0",marginRight:5}}>💾</span>}{label}
                      </div>
                      <div style={{fontSize:10,color:"#7a96c0",marginTop:2}}>
                        {cnt}/{total} · <span style={{color:"#34d39988"}}>{okCnt} OK</span>

                      {(checó||maneja)&&<div style={{fontSize:10,color:"#5a7aaa",marginTop:2}}>{[checó&&`👤 ${checó}`,maneja&&`🚗 ${maneja}`].filter(Boolean).join("  ")}</div>}
                    </div>
                    {issueItems.length>0&&<div style={{fontSize:18,flexShrink:0}}>⚠️</div>}
                    <div style={{color:"#3a4f72",fontSize:14,flexShrink:0}}>›</div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ══ FLOTA ════════════════════════════════════════════════════════ */}
        {vista==="flota"&&(
          <div>
            <div style={{fontSize:11,color:"#7a96c0",marginBottom:12}}>Última revisión guardada por vehículo</div>
            {fleetOverview.map(v=>{
              const col=v.pct===100?"#81c784":v.pct>=70?"#ffb74d":"#ff5252";
              return (
                <div key={v.id} style={{...card,border:`1px solid ${v.color}33`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontSize:22}}>{v.emoji}</span>
                      <div>
                        <div style={{fontSize:13,fontWeight:700,color:"#f0f6ff"}}>{v.nombre}</div>
                        {(v.marca||v.noEco)&&<div style={{fontSize:10,color:"#7a96c0"}}>{[v.marca,v.noEco?`No. Eco: ${v.noEco}`:""].filter(Boolean).join(" · ")}</div>}
                      </div>
                    </div>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      <span style={{fontSize:13,fontWeight:700,color:col}}>{v.pct}%</span>
                      <button onClick={()=>openEdit(v)} style={{background:"transparent",border:"none",color:"#7a96c0",fontSize:13,cursor:"pointer",padding:0}}>✏️</button>
                      {vehicles.length>1&&<button onClick={()=>deleteVehicle(v.id)} style={{background:"transparent",border:"none",color:"#7a96c0",fontSize:15,cursor:"pointer",padding:0}}>×</button>}
                    </div>
                  </div>
                  <div style={{height:4,background:"#e8e8e8",borderRadius:2,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${v.pct}%`,background:v.color,borderRadius:2,boxShadow:`0 0 6px ${v.color}66`}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#b8cce8",marginTop:5}}>
                    <span>{v.hasData?`${v.cnt}/${total} · ${v.okC} OK`:"Sin revisiones"}</span>
                    <span>💾 {v.wl}</span>
                  </div>
                  {(v.pD!==null||v.sD!==null)&&(
                    <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                      {v.pD!==null&&<span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:urgencyColor(v.pD)+"22",color:urgencyColor(v.pD),border:`1px solid ${urgencyColor(v.pD)}44`}}>🪪 {v.pD<0?"Vencidas":`${v.pD}d`}</span>}
                      {v.sD!==null&&<span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:urgencyColor(v.sD)+"22",color:urgencyColor(v.sD),border:`1px solid ${urgencyColor(v.sD)}44`}}>🛡️ {v.sD<0?"Vencido":`${v.sD}d`}</span>}
                    </div>
                  )}
                </div>
              );
            })}
            <button onClick={()=>{resetForm();setShowAdd(true);}} style={{width:"100%",padding:12,borderRadius:10,border:"1.5px dashed #2a3a56",background:"transparent",color:"#7a96c0",fontFamily:"inherit",fontSize:11,letterSpacing:1,textTransform:"uppercase",cursor:"pointer",marginTop:4}}>+ Agregar vehículo</button>
          </div>
        )}

        {/* ══ DOCUMENTOS ═══════════════════════════════════════════════════ */}
        {vista==="documentos"&&!subVista&&(
          <div>
            <div style={{fontSize:11,color:"#7a96c0",marginBottom:12}}>{av?.emoji} {av?.nombre} · Documentos</div>
            {[
              {key:"placas",icon:"🪪",label:"Placas",sub:vDocs.placas,campo:"numero",campoLabel:"Sin registro"},
              {key:"seguro",icon:"🛡️",label:"Seguro",sub:vDocs.seguro,campo:"aseguradora",campoLabel:"Sin registro"},
            ].map(({key,icon,label,sub,campo,campoLabel})=>{
              const d=daysUntil(sub?.vence), col=urgencyColor(d);
              return (
                <div key={key} style={{...card,cursor:"pointer"}} onClick={()=>setSubVista(key)}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontSize:22}}>{icon}</span>
                      <div><div style={{fontSize:13,fontWeight:600,color:"#7a96c0"}}>{label}</div><div style={{fontSize:10,color:"#7a96c0",marginTop:2}}>{sub?.[campo]||campoLabel}</div></div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      {d!==null?<><div style={{fontSize:13,fontWeight:700,color:col}}>{d<0?"Vencido/as":`${d} días`}</div><div style={{fontSize:10,color:"#7a96c0"}}>{fmtDate(sub?.vence)}</div></>:<div style={{fontSize:11,color:"#b8cce8"}}>Sin fecha →</div>}
                    </div>
                  </div>
                </div>
              );
            })}
            <div style={{...card,cursor:"pointer"}} onClick={()=>setSubVista("obs")}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:22}}>📝</span>
                  <div><div style={{fontSize:13,fontWeight:600,color:"#7a96c0"}}>Observaciones generales</div><div style={{fontSize:10,color:"#7a96c0",marginTop:2}}>{vDocs.observaciones?vDocs.observaciones.slice(0,40)+"...":"Sin notas"}</div></div>
                </div>
                <span style={{color:"#b8cce8",fontSize:16}}>→</span>
              </div>
            </div>
          </div>
        )}
        {vista==="documentos"&&subVista==="placas"&&(()=>{
          const p=vDocs.placas||{};
          return (
            <div>
              <button onClick={()=>setSubVista(null)} style={{background:"transparent",border:"none",color:"#7a96c0",fontFamily:"inherit",fontSize:11,cursor:"pointer",marginBottom:14,padding:0}}>← Volver</button>
              <div style={{fontSize:14,fontWeight:700,color:"#f0f6ff",marginBottom:16}}>🪪 Placas</div>
              <LABEL>Número de placas</LABEL><INPUT value={p.numero||""} onChange={e=>setVDocs({placas:{...p,numero:e.target.value}})} placeholder="ABC-123" />
              <LABEL>Fecha de vencimiento</LABEL><INPUT type="date" value={p.vence||""} onChange={e=>setVDocs({placas:{...p,vence:e.target.value}})} />
              <LABEL>Notas</LABEL><INPUT value={p.notas||""} onChange={e=>setVDocs({placas:{...p,notas:e.target.value}})} placeholder="Observaciones..." />
              {daysUntil(p.vence)!==null&&<div style={{padding:"10px 14px",borderRadius:8,background:urgencyColor(daysUntil(p.vence))+"22",border:`1px solid ${urgencyColor(daysUntil(p.vence))}44`,fontSize:12,color:urgencyColor(daysUntil(p.vence)),marginTop:4}}>{daysUntil(p.vence)<0?"⚠️ Vencidas":daysUntil(p.vence)<=30?`⚠️ Vencen en ${daysUntil(p.vence)} días`:`✓ Vigentes por ${daysUntil(p.vence)} días`}</div>}
            </div>
          );
        })()}
        {vista==="documentos"&&subVista==="seguro"&&(()=>{
          const s=vDocs.seguro||{};
          return (
            <div>
              <button onClick={()=>setSubVista(null)} style={{background:"transparent",border:"none",color:"#7a96c0",fontFamily:"inherit",fontSize:11,cursor:"pointer",marginBottom:14,padding:0}}>← Volver</button>
              <div style={{fontSize:14,fontWeight:700,color:"#f0f6ff",marginBottom:16}}>🛡️ Seguro</div>
              <LABEL>Aseguradora</LABEL><INPUT value={s.aseguradora||""} onChange={e=>setVDocs({seguro:{...s,aseguradora:e.target.value}})} placeholder="Ej. GNP, AXA, Quálitas..." />
              <LABEL>Número de póliza</LABEL><INPUT value={s.poliza||""} onChange={e=>setVDocs({seguro:{...s,poliza:e.target.value}})} placeholder="Póliza #" />
              <LABEL>Fecha de vencimiento</LABEL><INPUT type="date" value={s.vence||""} onChange={e=>setVDocs({seguro:{...s,vence:e.target.value}})} />
              <LABEL>Notas</LABEL><INPUT value={s.notas||""} onChange={e=>setVDocs({seguro:{...s,notas:e.target.value}})} placeholder="Observaciones..." />
              {daysUntil(s.vence)!==null&&<div style={{padding:"10px 14px",borderRadius:8,background:urgencyColor(daysUntil(s.vence))+"22",border:`1px solid ${urgencyColor(daysUntil(s.vence))}44`,fontSize:12,color:urgencyColor(daysUntil(s.vence)),marginTop:4}}>{daysUntil(s.vence)<0?"⚠️ Vencido":daysUntil(s.vence)<=30?`⚠️ Vence en ${daysUntil(s.vence)} días`:`✓ Vigente por ${daysUntil(s.vence)} días`}</div>}
            </div>
          );
        })()}
        {vista==="documentos"&&subVista==="obs"&&(
          <div>
            <button onClick={()=>setSubVista(null)} style={{background:"transparent",border:"none",color:"#7a96c0",fontFamily:"inherit",fontSize:11,cursor:"pointer",marginBottom:14,padding:0}}>← Volver</button>
            <div style={{fontSize:14,fontWeight:700,color:"#f0f6ff",marginBottom:16}}>📝 Observaciones generales</div>
            <textarea value={vDocs.observaciones||""} onChange={e=>setVDocs({observaciones:e.target.value})} placeholder="Notas, sugerencias o cualquier observación del vehículo..." rows={10} style={{width:"100%",padding:"12px",borderRadius:10,border:"1px solid #2a3a56",background:"#172035",color:"#7a96c0",fontFamily:"inherit",fontSize:13,resize:"vertical",boxSizing:"border-box",outline:"none"}} />
          </div>
        )}

        {/* ══ SERVICIOS ════════════════════════════════════════════════════ */}
        {vista==="servicios"&&(()=>{
          // Build pendientes from historial — count faults per item
          const allHistKeys = Object.keys(vData).filter(k=>k!==today);
          const faultCount = {};   // itemId -> { count, lastVal, lastWarn, lastObs, lastFoto }
          allHistKeys.forEach(k => {
            const e = vData[k]||{};
            CHECKLIST_ITEMS.forEach(item => {
              const ie = e[item.id]||{};
              if (ie.val && !ie.ok) {
                if (!faultCount[item.id]) faultCount[item.id] = { count:0, item, lastVal:null, lastWarn:false, lastObs:"", lastFoto:null, resuelto:false };
                faultCount[item.id].count++;
                faultCount[item.id].lastVal  = ie.val;
                faultCount[item.id].lastWarn = ie.warn;
                faultCount[item.id].lastObs  = ie.obs||"";
                faultCount[item.id].lastFoto  = ie.foto||null;
              }
            });
          });
          // merge resuelto state from vDocs.pendientes
          const savedPend = vDocs.pendientes || {};
          const pendientes = Object.values(faultCount).sort((a,b)=>b.count-a.count).map(p=>({
            ...p,
            resuelto: savedPend[p.item.id]?.resuelto||false,
            accion:   savedPend[p.item.id]?.accion||"",
          }));
          const setPendState = (itemId, partial) => {
            const cur = savedPend[itemId]||{};
            setVDocs({ pendientes: { ...savedPend, [itemId]: { ...cur, ...partial } } });
          };

          return (
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style={{fontSize:11,color:"#7a96c0"}}>{av?.emoji} {av?.nombre} · Servicios</div>
                <button onClick={()=>setShowSvcForm(true)} style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${accent}66`,background:accent+"22",color:accent,fontFamily:"inherit",fontSize:11,fontWeight:700,cursor:"pointer"}}>+ Registro</button>
              </div>

              {/* Sub-tabs */}
              <div style={{display:"flex",gap:4,marginBottom:14}}>
                {[["pendientes","⚠️ Pendientes"],["historial","📋 Registros"]].map(([t,l])=>(
                  <button key={t} onClick={()=>setSvcSubVista(t)} style={{flex:1,padding:"7px 0",border:"none",borderRadius:6,background:svcSubVista===t?accent:"#ede0cf",color:svcSubVista===t?"#0f1623":"#8aa8d0",fontFamily:"inherit",fontSize:11,fontWeight:700,cursor:"pointer",transition:"all 0.2s"}}>{l}</button>
                ))}
              </div>

              {/* PENDIENTES */}
              {svcSubVista==="pendientes"&&(
                <div>
                  {pendientes.length===0?(
                    <div style={{textAlign:"center",color:"#b8cce8",marginTop:50,fontSize:13}}><div style={{fontSize:34,marginBottom:10}}>✅</div>Sin fallas registradas en el historial.</div>
                  ):pendientes.map(p=>{
                    const col = p.resuelto?"#81c784":p.lastWarn?"#ffb74d":"#ff5252";
                    const opLabel = p.item.opciones.find(o=>o.v===p.lastVal)?.label||p.lastVal;
                    return (
                      <div key={p.item.id} style={{...card,border:`1px solid ${col}33`,opacity:p.resuelto?0.6:1}}>
                        <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:8}}>
                          <span style={{fontSize:20,flexShrink:0}}>{p.item.icon}</span>
                          <div style={{flex:1}}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                              <div style={{fontSize:13,fontWeight:700,color:p.resuelto?"#555":"#ccc",textDecoration:p.resuelto?"line-through":"none"}}>{p.item.label}</div>
                              <span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:col+"22",color:col,border:`1px solid ${col}44`,flexShrink:0,marginLeft:8}}>
                                {p.count}x reportado
                              </span>
                            </div>
                            <div style={{fontSize:11,color:col,marginTop:2}}>{opLabel}</div>
                            {p.lastObs&&<div style={{fontSize:10,color:"#7a96c0",marginTop:2}}>Última nota: {p.lastObs}</div>}
                          </div>
                          {p.lastFoto&&<button onClick={()=>setViewPhoto(p.lastFoto)} style={{background:"transparent",border:"1px solid #ffb74d55",color:"#ffb74d",borderRadius:4,padding:"2px 6px",fontFamily:"inherit",fontSize:10,cursor:"pointer",flexShrink:0}}>📷</button>}
                        </div>

                        {/* Acción */}
                        <div style={{borderTop:"1px solid #2a3a56",paddingTop:8,display:"flex",gap:8,alignItems:"center"}}>
                          <input
                            value={p.accion}
                            onChange={e=>setPendState(p.item.id,{accion:e.target.value})}
                            placeholder="¿Qué se hizo? (cambio, reparación, pendiente...)"
                            style={{flex:1,background:"transparent",border:"none",borderBottom:"1px solid #2a2a2a",color:"#b8cce8",fontFamily:"inherit",fontSize:11,outline:"none",paddingBottom:4}}
                          />
                        </div>
                        <div style={{display:"flex",gap:6,marginTop:8}}>
                          <button
                            onClick={()=>setPendState(p.item.id,{resuelto:!p.resuelto})}
                            style={{flex:1,padding:"6px 0",borderRadius:8,border:`1px solid ${p.resuelto?"#81c784":"#2a2a2a"}`,background:p.resuelto?"#81c78422":"transparent",color:p.resuelto?"#81c784":"#555",fontFamily:"inherit",fontSize:11,cursor:"pointer",fontWeight:p.resuelto?700:400}}
                          >{p.resuelto?"✓ Resuelto":"Marcar resuelto"}</button>
                          <button
                            onClick={()=>{
                              setSvcForm({fecha:today,tipo:p.item.label,km:"",mecanico:"",costo:"",notas:p.accion||p.lastObs||""});
                              setShowSvcForm(true);
                            }}
                            style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${accent}55`,background:accent+"11",color:accent,fontFamily:"inherit",fontSize:11,cursor:"pointer"}}
                          >→ Registrar servicio</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* REGISTROS */}
              {svcSubVista==="historial"&&(
                <div>
                  {servicios.length===0?(
                    <div style={{textAlign:"center",color:"#b8cce8",marginTop:50,fontSize:13}}><div style={{fontSize:34,marginBottom:10}}>🔧</div>Sin servicios registrados.</div>
                  ):[...servicios].reverse().map(s=>(
                    <div key={s.id} style={{...card}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                        <div><div style={{fontSize:13,fontWeight:700,color:"#7a96c0",marginBottom:4}}>🔧 {s.tipo||"Servicio"}</div><div style={{fontSize:10,color:"#7a96c0"}}>{fmtDate(s.fecha)}</div></div>
                        <div style={{display:"flex",gap:8,alignItems:"center"}}>
                          {s.costo&&<span style={{fontSize:11,color:"#81c784",fontWeight:600}}>${s.costo}</span>}
                          <button onClick={()=>setVDocs({servicios:servicios.filter(x=>x.id!==s.id)})} style={{background:"transparent",border:"none",color:"#7a96c0",fontSize:15,cursor:"pointer",padding:0}}>×</button>
                        </div>
                      </div>
                      <div style={{display:"flex",gap:16,marginTop:8,flexWrap:"wrap"}}>
                        {s.km&&<span style={{fontSize:10,color:"#b8cce8"}}>📍 {s.km} km</span>}
                        {s.mecanico&&<span style={{fontSize:10,color:"#b8cce8"}}>👨‍🔧 {s.mecanico}</span>}
                      </div>
                      {s.notas&&<div style={{fontSize:11,color:"#7a96c0",marginTop:8,paddingTop:8,borderTop:"1px solid #2a3a56"}}>{s.notas}</div>}
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })()}

      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));

function Boot() {
  const [ready, setReady] = React.useState(!!window.firebaseApp);
  React.useEffect(() => {
    if (ready) return;
    const onReady = () => setReady(true);
    window.addEventListener("firebase-ready", onReady);
    return () => window.removeEventListener("firebase-ready", onReady);
  }, [ready]);
  if (!ready) {
    return (
      <div style={{minHeight:"100vh",background:"#0f1623",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Mono','Courier New',monospace"}}>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:36,marginBottom:12}}>🚛</div>
          <div style={{color:"#f5a623",fontSize:12,letterSpacing:"0.15em",textTransform:"uppercase",fontWeight:700}}>Iniciando...</div>
        </div>
      </div>
    );
  }
  return <App />;
}

root.render(<Boot />);
</script>
</body>
</html>
